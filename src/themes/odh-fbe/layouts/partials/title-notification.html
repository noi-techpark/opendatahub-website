{{" <!-- Title -->" | safeHTML }}
<section {{ if (isset . "identifier") }} id="{{.identifier}}" {{end}}>
    <div class="container">
        <div class="row justify-content-between gy-4">
            <div class="col-12 col-lg-6">
                <h1>{{ .title | markdownify }}</h1>
                {{ with .subtitle }}<p class="fw-semibold fs-5 lh-base">{{ . | markdownify }}</p>{{ end }}
            </div>
            {{ partial "contact-mailto.html" . }}
        </div>
    </div>
</section>
{{" <!-- /Title -->" | safeHTML }}
